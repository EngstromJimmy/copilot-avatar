<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Copilot Avatar</title>
<link rel="stylesheet" href="style.css" />
<script src="/__bridge.js"></script>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
    }
  }
</script>
</head>
<body>
  <div id="avatar-container"></div>
  <div id="subagent-overlays" aria-hidden="true"></div>
  <div id="status-container">
    <div id="status-indicator"></div>
    <div id="subtasks"></div>
  </div>
  <div id="message-container">
    <div id="message-text"></div>
  </div>
  <div id="emotion-bubble" aria-hidden="true"></div>
  <div id="tts-controls">
    <button id="tts-toggle" title="Toggle text-to-speech">🔇</button>
    <button id="tts-settings-btn" title="Avatar settings">⚙️</button>
    <div id="tts-dropdown" class="hidden">
      <button id="run-demo-btn" type="button">Run demo sequence</button>
      <label class="tts-checkbox-row" for="message-visibility-toggle">
        <span>Show spoken text</span>
        <input id="message-visibility-toggle" type="checkbox" checked />
      </label>
      <label>Voice
        <select id="tts-voice-select"></select>
      </label>
      <label>Speed
        <input id="tts-rate-input" type="range" min="0.5" max="3" step="0.1" value="1.1" />
        <span id="tts-rate-value">1.1×</span>
      </label>
      <label>Pitch
        <input id="tts-pitch-input" type="range" min="0.5" max="2" step="0.1" value="1.0" />
        <span id="tts-pitch-value">1.0</span>
      </label>
    </div>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
